[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build", "cd server && npx prisma generate"]

[start]
cmd = "cd server && NODE_ENV=production npx prisma migrate deploy && NODE_ENV=production npx tsx prisma/seed.ts && NODE_ENV=production node dist/index.js"
